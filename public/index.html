// Reveal-on-scroll wrapper
function Reveal({ as = 'div', variant = '', delay = 0, className = '', children, ...rest }) {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const io = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) { setTimeout(() => el.classList.add('show'), delay); io.unobserve(el); }
    }, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' });
    io.observe(el);
    return () => io.disconnect();
  }, [delay]);
  const Tag = as;
  return <Tag ref={ref} className={`reveal ${variant} ${className}`} {...rest}>{children}</Tag>;
}

// Stagger children with reveal
function Stagger({ className = '', step = 90, children }) {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const io = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) {
        [...el.children].forEach((c, i) => {
          c.classList.add('reveal');
          setTimeout(() => c.classList.add('show'), i * step);
        });
        io.unobserve(el);
      }
    }, { threshold: 0.08 });
    io.observe(el);
    return () => io.disconnect();
  }, [step]);
  return <div ref={ref} className={className}>{children}</div>;
}

// Animated divider line
function Line() {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current;
    const io = new IntersectionObserver(([e]) => { if (e.isIntersecting) { el.classList.add('show'); io.unobserve(el); } }, { threshold: 0.5 });
    io.observe(el);
    return () => io.disconnect();
  }, []);
  return <hr ref={ref} className="lineReveal border-0 border-t border-line/80 max-w-6xl mx-auto" />;
}

// Counting number
function Counter({ value, suffix = '', decimals = 0 }) {
  const ref = useRef(null);
  const [txt, setTxt] = useState(decimals ? (0).toFixed(decimals) + suffix : '0' + suffix);
  useEffect(() => {
    const el = ref.current;
    const io = new IntersectionObserver(([e]) => {
      if (!e.isIntersecting) return;
      const dur = 1300; let start = null;
      const tick = (now) => {
        if (start === null) start = now;
        const p = Math.min((now - start) / dur, 1);
        const ease = 1 - Math.pow(1 - p, 4);
        const v = value * ease;
        setTxt(decimals ? v.toFixed(decimals) + suffix : Math.round(v) + suffix);
        if (p < 1) requestAnimationFrame(tick);
      };
      requestAnimationFrame(tick);
      io.unobserve(el);
    }, { threshold: 0.5 });
    io.observe(el);
    return () => io.disconnect();
  }, [value, suffix, decimals]);
  return <span ref={ref}>{txt}</span>;
}

<span className="text-faint2">{`// Write receipt per alert → ERC-8004`}</span>{`\n`}
<span className="text-pink-300">const</span>{` contract = `}<span className="text-pink-300">new</span>{` `}<span className="text-orange-400">Contract</span>{`(\n  REPUTATION_REGISTRY, ABI, wallet\n);\n\n`}

<span className="text-pink-300">const</span>{` tx = `}<span className="text-pink-300">await</span>{` contract.`}<span className="text-orange-400">giveFeedback</span>{`(\n  `}<span className="text-amber-300">9358</span>{`,      `}<span className="text-faint2">{`// Pulse agent ID`}</span>{`\n  [tag],     `}<span className="text-faint2">{`// alert type tag`}</span>{`\n  [`}<span className="text-amber-300">1</span>{`],       `}<span className="text-faint2">{`// positive signal`}</span>{`\n  comment    `}<span className="text-faint2">{`// human-readable note`}</span>{`\n);\n\n`}
<span className="text-pink-300">await</span>{` tx.`}<span className="text-orange-400">wait</span>{`();\n`}

function App() {
  // cursor gas glow
  useEffect(() => {
    const gas = document.getElementById('gas');
    const move = (x, y) => {
      gas.style.setProperty('--mx', x + 'px');
      gas.style.setProperty('--my', y + 'px');
    };
    const onMouse = (e) => move(e.clientX, e.clientY);
    const onTouch = (e) => { if (e.touches[0]) move(e.touches[0].clientX, e.touches[0].clientY); };
    window.addEventListener('mousemove', onMouse);
    window.addEventListener('touchmove', onTouch, { passive: true });
    return () => { window.removeEventListener('mousemove', onMouse); window.removeEventListener('touchmove', onTouch); };
  }, []);

  return (
    <>
      <Nav />
      <Hero />
      <div className="my-6"><Line /></div>
      <HowItWorks />
      <Line />
      <Compare />
      <Line />
      <Features />
      <Line />
      <Tech />
      <Line />
      <CodeSection />
      <Line />
      <FinalCTA />
      <Footer />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
